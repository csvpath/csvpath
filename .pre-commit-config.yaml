repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.8  # Use the latest version
  hooks:
    - id: ruff-check
      args: [ --fix ]
    - id: ruff-format

- repo: local
  hooks:
    - id: no-commit-to-main
      name: Prevent commits to main
      entry: bash -c 'branch=$(git symbolic-ref HEAD 2>/dev/null | sed "s|refs/heads/||"); if [ "$branch" = "main" ]; then echo "❌ Direct commits to main are blocked. Create a branch first."; exit 1; fi'
      language: system
      pass_filenames: false

